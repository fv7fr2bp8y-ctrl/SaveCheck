<style>
  :root {
    --green:#16a34a; --yellow:#f59e0b; --red:#dc2626; --gray:#6b7280;

  * { box-sizing:border-box; }
  body {
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:760px; margin:0 auto; padding:20px 16px 60px; }
  .top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:22px; margin:0 0 2px; letter-spacing:-.02em; }
  header h1 b { color:var(--green); }
  header p { margin:0 0 4px; color:var(--muted); font-size:13.5px; max-width:460px; }
  .flags { display:flex; gap:6px; }
  .flags button {
    border:1px solid var(--line); background:var(--card); border-radius:10px; cursor:pointer;
    padding:5px 8px; font-size:16px; line-height:1; display:flex; align-items:center; gap:5px;
    transition:border-color .12s, box-shadow .12s;
  }
  .flags button .cc { font-size:11px; font-weight:700; color:var(--muted); }
  .flags button.active { border-color:var(--ink); box-shadow:0 2px 8px rgba(15,23,42,.10); }
  .flags button.active .cc { color:var(--ink); }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:10px; margin-top:16px; }
  .card {
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 13px;
    cursor:pointer; transition:transform .08s, box-shadow .12s, border-color .12s; text-align:left;
  }
  .card:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(15,23,42,.07); }
  .card.active { border-color:var(--ink); box-shadow:0 6px 18px rgba(15,23,42,.10); }
  .card .tag {
    display:inline-block; font-size:10.5px; font-weight:750; color:#fff;
    padding:2px 9px; border-radius:999px; margin-bottom:9px; letter-spacing:.02em;
  }
  .card .nm { font-weight:650; font-size:14px; }
  .card .pk { color:var(--muted); font-size:12px; margin-bottom:8px; }
  .card .pr { font-size:18px; font-weight:750; }
  .card .unit { color:var(--muted); font-size:11.5px; font-weight:600; margin-top:1px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; margin-top:16px; }
  .badge {
    display:inline-flex; align-items:center; gap:8px; color:#fff; font-weight:750; font-size:14px;
    padding:7px 13px; border-radius:999px;
  }
  .badge .ico { font-size:15px; }
  .ptitle { font-weight:750; font-size:16px; margin:12px 0 0; }
  .ptitle span { color:var(--muted); font-weight:500; font-size:13px; }
  .reason { margin:6px 0 4px; font-size:14.5px; line-height:1.45; }
  .chart-box { position:relative; height:230px; margin:10px 0 2px; }
  .sum { width:100%; border-collapse:collapse; margin-top:8px; font-size:13.5px; }
  .sum td { padding:7px 4px; border-top:1px solid var(--line); }
  .sum td:first-child { color:var(--muted); }
  .sum td:last-child { text-align:right; font-weight:700; font-variant-numeric:tabular-nums; }
  .sum .date { color:var(--muted); font-weight:500; font-size:12px; }
  .pill { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; vertical-align:middle; }
  .tabs { display:flex; gap:8px; margin-top:18px; }
  .tabs button {
    border:1px solid var(--line); background:var(--card); border-radius:10px; padding:7px 15px;
    font-size:13px; font-weight:650; cursor:pointer; color:var(--muted);
  }
  .tabs button.on { border-color:var(--ink); color:var(--ink); box-shadow:0 2px 8px rgba(15,23,42,.08); }
  .offers { margin-top:16px; }
  .otitle { font-size:11.5px; font-weight:750; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin-bottom:4px; }
  .orow, .brow, .irow {
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:9px 4px; border-top:1px solid var(--line); font-size:13.5px;
  }
  .orow.best span:first-child, .brow.best span:first-child { color:var(--green); font-weight:700; }
  .orow span:last-child, .brow span:last-child, .irow span:last-child { font-variant-numeric:tabular-nums; font-weight:700; }
  .bbadge { background:var(--green); color:#fff; font-size:10px; font-weight:750; padding:2px 7px; border-radius:999px; margin-left:7px; }
  .save { color:var(--green); font-size:12px; font-weight:700; margin-left:8px; }
  .irow span:last-child { color:var(--muted); font-weight:600; }
  footer { color:var(--muted); font-size:12px; margin-top:22px; line-height:1.5; }
</style>

const DEMO = (window.SAVECHECK_DEMO || {products:[]});
const products = DEMO.products;
let active = 0, country = COUNTRIES[0], view = 'products';

// Store chains per market — a mix of domestic and foreign (international)
// chains. Illustrative: real footprints vary.
const CHAINS_BY_COUNTRY = {
  BG:['Lidl','Kaufland','Billa','Fantastico'],
  RS:['Lidl','Maxi','Idea','Univerexport'],
  MK:['Vero','Tinex','Stokomak','Ramstore'],
  BA:['Bingo','Konzum','Mercator','Amko'],
  ME:['Voli','Idea','Aroma','Franca'],
  XK:['Viva Fresh','Meridian','ETC','Albi'],
  AL:['Spar','Big Market','Conad','Ecomarket'],
  HR:['Konzum','Lidl','Kaufland','Plodine'],
  SI:['Mercator','Spar','Lidl','Hofer'],
  RO:['Lidl','Kaufland','Carrefour','Mega Image'],
  GR:['Sklavenitis','AB Vasilopoulos','Lidl','Masoutis'],
  TR:['BİM','A101','Migros','Carrefour'],
};
// Deterministic per-(chain,product) spread in [0,12%]; the cheapest chain in a
// market is normalised to the product's current (promo) price.
function chainDelta(chain, pid) {
  let h = 0; const s = chain + '|' + pid;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return (h % 13) / 100;
}
function offersFor(p) {
  const chains = CHAINS_BY_COUNTRY[country.code] || [];
  const raw = chains.map(c => ({ chain: c, d: chainDelta(c, p.id) }));
  const minD = Math.min(...raw.map(r => r.d));
  return raw.map(r => ({ chain: r.chain, price: p.current_price * (1 + r.d - minD) }))
            .sort((a, b) => a.price - b.price);
}

const ddmm = iso => { if(!iso) return ''; const [ , m, d] = iso.split('-'); return d + '.' + m; };
const disp = x => x.toFixed(country.dec).replace('.', ',');        // a converted number
const money = vBgn => vBgn == null ? '—' : disp(vBgn * country.fx) + ' ' + country.sym;
const unitLabel = kind => country.sym + '/' + UNIT[kind][country.lang];
const unitWord = kind => (UNIT[kind] ? UNIT[kind][country.lang] : '');
const fmtQty = v => Number.isInteger(v) ? String(v) : String(Math.round(v * 100) / 100);
const t = () => UI[country.lang];

function renderFlags() {
  document.getElementById('flags').innerHTML = COUNTRIES.map((c, i) => `
    <button class="${c.code===country.code?'active':''}" onclick="setCountry(${i})" title="${c.code}">
      ${c.flag}<span class="cc">${c.code}</span>
    </button>`).join('');
}

function renderChrome() {
  document.getElementById('tagline').textContent = t().tagline;
  document.getElementById('footer').textContent = t().footer;
}

function renderCards() {
  document.getElementById('cards').innerHTML = products.map((p, i) => {
    const meta = PRODUCTS[p.id];
    return `
    <button class="card ${i===active?'active':''}" onclick="select(${i})">
      <div class="tag" style="background:${C[p.verdict]}">${TAG[p.verdict][country.lang]}</div>
      <div class="nm">${meta.name[country.lang]}</div>
      <div class="pk">${meta.pack[country.lang]}</div>
      <div class="pr">${money(p.current_price)}</div>
      <div class="unit">${p.current_unit_price==null?'':disp(p.current_unit_price*country.fx)+' '+unitLabel(p.unit_kind)}</div>
    </button>`;
  }).join('');
}

function row(pillColor, label, value, dateIso) {
  const pill = pillColor ? `<span class="pill" style="background:${pillColor}"></span>` : '';
  const date = dateIso ? ` <span class="date">· ${ddmm(dateIso)}</span>` : '';
  return `<tr><td>${pill}${label}</td><td>${value}${date}</td></tr>`;
}

function renderPanel() {
  const p = products[active], meta = PRODUCTS[p.id], col = C[p.verdict], L = t();
  const reason = REASONS[p.reason_code][country.lang](p.discount_pct);
  const discTxt = p.discount_pct != null && p.discount_pct > 0
      ? ` · <b style="color:${C.green}">−${p.discount_pct}%</b>` : '';
  const unitTxt = p.current_unit_price==null ? '' : ' · ' + disp(p.current_unit_price*country.fx)+' '+unitLabel(p.unit_kind);
  document.getElementById('panel').innerHTML = `
    <span class="badge" style="background:${col}"><span class="ico">${ICON[p.verdict]}</span>${BADGE[p.verdict][country.lang]}</span>
    <div class="ptitle">${meta.name[country.lang]} <span>${meta.pack[country.lang]}${unitTxt}</span></div>
    <div class="reason">${reason}</div>
    <div class="chart-box"><canvas id="chart"></canvas></div>
    <table class="sum">
      ${row(col, L.now, money(p.current_price) + discTxt)}
      ${row('#94a3b8', L.avg, money(p.median_90))}
      ${row(C.green, L.low, money(p.min_90), p.lowest_day)}
      ${row(C.red, L.high, money(p.max_90), p.highest_day)}
      ${row(null, L.floor30, money(p.min_30_prior))}
    </table>
    <div class="offers">
      <div class="otitle">${BX[country.lang].chains}</div>
      ${offersFor(p).map((o, i) => `<div class="orow ${i===0?'best':''}">
        <span>${i===0?'✓ ':''}${o.chain}</span><span>${money(o.price)}</span></div>`).join('')}
    </div>`;
  drawChart(p, col);
}

function renderTabs() {
  const X = BX[country.lang];
  document.getElementById('tabs').innerHTML =
    `<button class="${view==='products'?'on':''}" onclick="setView('products')">${X.tabProducts}</button>
     <button class="${view==='basket'?'on':''}" onclick="setView('basket')">${X.tabBasket}</button>
     <button class="${view==='fridge'?'on':''}" onclick="setView('fridge')">${X.tabFridge}</button>`;
}

function renderFridge() {
  const X = BX[country.lang], F = DEMO.fridge || { recognized: [], shopping: [] };
  const nameOf = id => (PRODUCTS[id] ? PRODUCTS[id].name[country.lang] : id);
  const recognized = F.recognized.map(r => `
    <div class="irow"><span>${nameOf(r.id)}</span>
      <span>${fmtQty(r.quantity)} ${unitWord(r.unit)} · ${Math.round(r.confidence*100)}%</span></div>`).join('');
  const shopping = F.shopping.map(s => {
    const prod = products.find(p => p.id === s.id);  // links to стълб 1 verdict
    const pill = prod ? `<span class="tag" style="background:${C[prod.verdict]};margin-left:7px">${TAG[prod.verdict][country.lang]}</span>` : '';
    const reason = s.reason_code === 'missing' ? X.missing : X.low;
    return `<div class="brow"><span>${nameOf(s.id)}${pill}</span>
      <span>${fmtQty(s.needed_quantity)} ${unitWord(s.unit)} <span class="date">· ${reason}</span></span></div>`;
  }).join('');
  document.getElementById('basket').innerHTML = `
    <div class="panel">
      <div class="otitle">${X.recognized}</div>${recognized}
      <div class="otitle" style="margin-top:14px">${X.shopping}</div>${shopping}
    </div>`;
}

function renderBasket() {
  const X = BX[country.lang], chains = CHAINS_BY_COUNTRY[country.code] || [];
  const totals = chains.map(c => {
    let t = 0; products.forEach(p => { const o = offersFor(p).find(o => o.chain === c); if (o) t += o.price; });
    return { chain: c, total: t };
  }).sort((a, b) => a.total - b.total);
  const max = Math.max(...totals.map(t => t.total)), best = totals[0];
  const rows = totals.map((t, i) => {
    const badge = i===0 ? `<span class="bbadge">${X.cheapestBasket}</span>` : '';
    const save = i===0 ? `<span class="save">${X.save} ${money(max - best.total)}</span>` : '';
    return `<div class="brow ${i===0?'best':''}"><span>${t.chain}${badge}</span><span>${money(t.total)}${save}</span></div>`;
  }).join('');
  const items = products.map(p => {
    const o = offersFor(p)[0], meta = PRODUCTS[p.id];
    return `<div class="irow"><span>${meta.name[country.lang]}</span><span>${o.chain} · ${money(o.price)}</span></div>`;
  }).join('');
  document.getElementById('basket').innerHTML = `
    <div class="panel">
      <div class="otitle">${X.basketTitle}</div>${rows}
      <div class="otitle" style="margin-top:14px">${X.perItem}</div>${items}
    </div>`;
}

function lastIndexNear(arr, target) {
  if (target == null) return -1;
  let idx = -1; arr.forEach((v, i) => { if (Math.abs(v - target) < 1e-9) idx = i; }); return idx;
}

let chart = null;
const zonePlugin = {
  id: 'zones',
  beforeDatasetsDraw(c, _a, opts) {
    if (opts.median == null) return;
    const { ctx, chartArea:{left,right,top,bottom}, scales:{y} } = c;
    let ym = y.getPixelForValue(opts.median); ym = Math.max(top, Math.min(bottom, ym));
    ctx.save();
    ctx.fillStyle='rgba(22,163,74,0.06)'; ctx.fillRect(left, ym, right-left, bottom-ym);
    ctx.fillStyle='rgba(220,38,38,0.06)'; ctx.fillRect(left, top, right-left, ym-top);
    ctx.restore();
  },
};

function drawChart(p, col) {
  const fx = country.fx, L = t();
  const labels = p.series.map(s => ddmm(s.day));
  const base = p.series.map(s => s.price);
  const prices = base.map(v => v * fx);
  const lastIdx = base.length - 1;
  const lowIdx = lastIndexNear(base, p.min_90);
  const highIdx = lastIndexNear(base, p.max_90);
  const radius = base.map((_, i) => i===lastIdx?5:(i===lowIdx||i===highIdx?4:0));
  const pColor = base.map((_, i) => i===lastIdx?col:(i===lowIdx?C.green:(i===highIdx?C.red:'transparent')));

  const datasets = [{
    label:L.price, data:prices, borderColor:col, backgroundColor:col+'14',
    borderWidth:2, fill:true, stepped:true,
    pointRadius:radius, pointBackgroundColor:pColor, pointBorderColor:'#fff', pointBorderWidth:1.5,
  }];
  const medianDisp = p.median_90==null ? null : p.median_90*fx;
  if (medianDisp!=null) datasets.push({
    label:L.avgLeg, data:base.map(()=>medianDisp), borderColor:'#94a3b8', borderWidth:1.3,
    borderDash:[6,6], pointRadius:0, fill:false,
  });

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type:'line', data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false, interaction:{ intersect:false, mode:'index' },
      plugins:{
        zones:{ median:medianDisp },
        legend:{ display:true, labels:{ boxWidth:12, font:{size:11} } },
        tooltip:{ callbacks:{ label:c => c.dataset.label + ': ' + disp(c.parsed.y) + ' ' + country.sym } },
      },
      scales:{
        x:{ ticks:{ maxTicksLimit:7, font:{size:10}, color:'#94a3b8' }, grid:{ display:false } },
        y:{ ticks:{ callback:v => v.toFixed(country.dec), font:{size:10}, color:'#94a3b8' }, grid:{ color:'#eef2f6' } },
      },
    },
    plugins:[zonePlugin],
  });
}

function render() {
  renderFlags(); renderChrome(); renderTabs();
  const prod = view === 'products';
  document.getElementById('cards').style.display = prod ? '' : 'none';
  document.getElementById('panel').style.display = prod ? '' : 'none';
  document.getElementById('basket').style.display = prod ? 'none' : '';
  if (prod) { renderCards(); renderPanel(); }
  else if (view === 'basket') { renderBasket(); }
  else { renderFridge(); }
}
function select(i){ active = i; renderCards(); renderPanel(); }
function setCountry(i){ country = COUNTRIES[i]; document.documentElement.lang = country.lang; render(); }
function setView(v){ view = v; render(); }

render();
</script>
