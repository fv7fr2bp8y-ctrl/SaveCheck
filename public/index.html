<!DOCTYPE html>
<html lang="bg">
<head>

<title>SaveCheck — реална ли е промоцията?</title>

<style>
  :root {

    --t-xs:10px; --t-sm:12px; --t-base:14px; --t-md:15px; --t-lg:17px; --t-xl:22px; --t-2xl:28px;

  }
  [data-theme="dark"] {
    --green:#22c55e; --green-d:#16a34a; --green-bg:#14532d;
    --yellow:#fbbf24; --red:#f87171; --gray:#9ca3af;
    --ink:#e8eaf0; --muted:#8b9ab0; --line:#2c2c2e; --card:#1c1c1e; --cream:#111113;

  }
  [data-theme="dark"] body { background:radial-gradient(1100px 560px at 50% -8%,#0a2418,#0f0f11); }
  [data-theme="dark"] .phone { border-color:#2c2c2e; box-shadow:0 30px 70px rgba(0,0,0,.7); }
  [data-theme="dark"] .titan-bar-wrap { background:#2c2c2e; }

  [data-theme="dark"] .advice-box { background:color-mix(in srgb,var(--green) 12%,var(--card)); }

  body {

  .phone {

  .appbar { background:var(--card); padding:16px 18px 12px; border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:10px; }

  .bbadge { background:var(--green); color:#fff; font-size:9.5px; font-weight:750; padding:2px 7px; border-radius:999px; margin-left:7px; }
  .save { color:var(--green); font-size:11.5px; font-weight:700; margin-left:8px; }

  .ctable td { padding:7px 5px; border-top:1px solid var(--line); text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }

  .titan-card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:10px; }
  .titan-rank { font-size:22px; line-height:1; margin-right:10px; }
  .titan-name { font-size:15px; font-weight:800; flex:1; }
  .titan-score { font-size:17px; font-weight:900; font-variant-numeric:tabular-nums; }
  .titan-bar-wrap { margin:8px 0 5px; height:9px; background:#ece7df; border-radius:999px; overflow:hidden; display:flex; }
  .titan-bar-real { background:var(--green); border-radius:999px 0 0 999px; }
  .titan-bar-fake { background:var(--red); }
  .titan-meta { display:flex; justify-content:space-between; font-size:11.5px; }
  .titan-hero { background:linear-gradient(135deg,#15803d,#166534); color:#fff; border-radius:18px; padding:14px 16px; margin-bottom:12px; }
  .titan-hero .th-title { font-size:17px; font-weight:900; letter-spacing:-.01em; margin-bottom:3px; }
  .titan-hero .th-sub { font-size:12px; opacity:.9; line-height:1.4; }
  .broch-chain { background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:10px; overflow:hidden; }
  .broch-head { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; }
  .broch-head .bh-name { font-weight:800; font-size:15px; }
  .broch-head .bh-count { font-size:12px; color:var(--muted); }
  .broch-head .bh-badge { display:flex; gap:6px; }
  .broch-body { border-top:1px solid var(--line); }
  .broch-item { display:flex; align-items:center; gap:9px; padding:9px 14px; border-top:1px solid var(--line); font-size:13px; }

  .broch-item .bi-name { flex:1; font-size:12.5px; line-height:1.3; }
  .broch-item .bi-price { font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .broch-item .bi-old { color:var(--muted); font-size:11px; text-decoration:line-through; }

  .broch-hero { background:linear-gradient(135deg,#1d4ed8,#1e40af); color:#fff; border-radius:18px; padding:14px 16px; margin-bottom:12px; }
  .broch-hero .bh-title { font-size:17px; font-weight:900; margin-bottom:3px; }
  .broch-hero .bh-sub { font-size:12px; opacity:.9; }
  .scan-wrap { position:relative; border-radius:18px; overflow:hidden; background:#000; aspect-ratio:4/3; margin-bottom:12px; }
  .scan-wrap video { width:100%; height:100%; object-fit:cover; display:block; }
  .scan-frame { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .scan-frame::before { content:''; display:block; width:70%; aspect-ratio:3/1; border:2.5px solid rgba(255,255,255,.85); border-radius:10px; box-shadow:0 0 0 2000px rgba(0,0,0,.35); }
  .scan-hint { position:absolute; bottom:14px; left:0; right:0; text-align:center; color:#fff; font-size:12px; font-weight:600; opacity:.9; }
  .scan-btn { width:100%; background:var(--green); color:#fff; border:0; border-radius:14px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; margin-bottom:12px; }
  .scan-result-card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .scan-ean { font-size:10.5px; color:var(--muted); margin-top:8px; }
  /* ── Home tab ── */
  .home-hero { background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; border-radius:20px; padding:20px; margin-bottom:6px; box-shadow:0 8px 24px rgba(22,163,74,.28); }
  .home-hero-lbl { font-size:var(--t-sm); opacity:.9; font-weight:600; letter-spacing:.01em; }
  .home-hero-amt { font-size:var(--t-2xl); font-weight:900; letter-spacing:-.03em; margin-top:2px; line-height:1; }
  .home-hero-meta { font-size:var(--t-sm); opacity:.9; margin-top:6px; }
  .section-label { font-size:var(--t-xs); font-weight:750; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin:16px 0 8px; }
  .deal-scroll { display:flex; gap:10px; overflow-x:auto; padding:0 14px 6px; margin:0 -14px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .deal-scroll::-webkit-scrollbar { display:none; }
  .deal-card { flex:none; width:110px; background:var(--card); border-radius:16px; padding:13px 12px 11px; box-shadow:var(--shadow-card); cursor:pointer; scroll-snap-align:start; transition:transform .12s; }
  .deal-card:active { transform:scale(.96); }
  .deal-emoji { font-size:28px; margin-bottom:6px; line-height:1; }
  .deal-name { font-size:11px; font-weight:700; line-height:1.3; margin-bottom:5px; color:var(--ink); }
  .deal-disc { font-size:var(--t-xl); font-weight:900; letter-spacing:-.02em; line-height:1; }
  .deal-price { font-size:var(--t-xs); color:var(--muted); margin-top:2px; font-variant-numeric:tabular-nums; }
  .card-block { background:var(--card); border-radius:16px; overflow:hidden; box-shadow:var(--shadow-card); margin-bottom:12px; }
  .mini-titan { display:flex; align-items:center; gap:10px; padding:11px 14px; border-top:1px solid var(--line); }
  .mini-titan:first-child { border-top:0; }
  /* ── Sub-tabs (pill toggle) ── */
  #sub-tabs-wrap { padding:10px 14px 0; }
  .sub-tabs { display:flex; gap:4px; background:var(--cream); border-radius:13px; padding:3px; border:1px solid var(--line); }
  .sub-tabs button { flex:1; border:0; background:none; cursor:pointer; padding:7px 6px; border-radius:10px; font-size:var(--t-sm); font-weight:700; color:var(--muted); font-family:inherit; line-height:1.2; white-space:nowrap; transition:all .15s; }
  .sub-tabs button.active { background:var(--card); color:var(--ink); box-shadow:0 1px 4px rgba(0,0,0,.10); }
  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(8px) scale(.95); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .anim-in { animation: fadeUp .2s ease-out; }
  .detail { animation: fadeUp .16s ease-out; }
  .deal-card:nth-child(1) { animation: cardIn .22s ease-out both; }
  .deal-card:nth-child(2) { animation: cardIn .22s .06s ease-out both; }
  .deal-card:nth-child(3) { animation: cardIn .22s .12s ease-out both; }
  .deal-card:nth-child(4) { animation: cardIn .22s .18s ease-out both; }
  .deal-card:nth-child(5) { animation: cardIn .22s .24s ease-out both; }
  .deal-card:nth-child(6) { animation: cardIn .22s .30s ease-out both; }
  .deal-card:nth-child(7) { animation: cardIn .22s .36s ease-out both; }
  .prow { transition: background .12s; }
  .bottomnav button { transition: color .15s, transform .1s; }
  .bottomnav button:active { transform: scale(.86); }
  /* ── Search ── */
  .search-wrap { padding:10px 14px 0; }
  .search-wrap input {
    width:100%; border:1.5px solid var(--line); border-radius:12px;
    padding:9px 14px; font-size:14px; background:var(--card); color:var(--ink);
    outline:none; font-family:inherit;
  }
  .search-wrap input:focus { border-color:var(--green); }
  .cadd { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--green); background:none; cursor:pointer; font-size:15px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:none; color:var(--green); line-height:1; padding:0; }
  .cadd.in { background:var(--green); color:#fff; }
  .advice-box { background:#eaf5ee; border:1.5px solid var(--green); border-radius:14px; padding:12px 14px; margin-bottom:12px; }
  .advice-box .advice-lbl { font-size:10.5px; font-weight:700; color:var(--green-d); text-transform:uppercase; letter-spacing:.04em; }
  .advice-box .advice-chain { font-size:17px; font-weight:800; margin:3px 0 1px; }
  .advice-box .advice-sub { font-size:12px; color:var(--muted); }
  .srow { display:flex; justify-content:space-between; align-items:center; padding:8px 2px; border-top:1px solid var(--line); font-size:13px; }
  .srow .scov { font-size:11px; color:var(--muted); margin-left:6px; }
  .srow.sbest span:first-child { color:var(--green); font-weight:700; }
  .bottomnav { display:flex; background:var(--card); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom,0); }
  .bottomnav button {
    flex:1; border:0; background:none; cursor:pointer; padding:8px 4px 10px; color:var(--muted);
    font-size:10px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:2px; position:relative;
  }
  .bottomnav button .ic { width:22px; height:22px; display:block; }
  .bottomnav button .ic svg { width:100%; height:100%; display:block; }
  .bottomnav button.on { color:var(--green-d); }
  footer { color:var(--muted); font-size:11px; line-height:1.5; max-width:430px; margin:14px auto 0; text-align:center; padding:0 16px; }
</style>
</head>
<body>
<div class="phone">
  <div class="appbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="3" y="3" width="26" height="26" rx="8" fill="#16a34a"/>

    <div class="cards" id="cards"></div>

</div>

<script>
const C = { red:'#dc2626', green:'#16a34a', yellow:'#f59e0b', gray:'#6b7280' };
const ICON = { red:'✕', green:'✓', yellow:'≈', gray:'?' };

// code -> language. fx multiplies the BGN base price; dec = currency decimals.
const COUNTRIES = [
  // Only Bulgaria and Greece for now — both on the euro.
  { code:'BG', flag:'🇧🇬', lang:'bg', fx:0.5113, sym:'€', dec:2 },
  { code:'GR', flag:'🇬🇷', lang:'el', fx:0.5113, sym:'€', dec:2 },
];

const UI = {
  bg:{ tagline:'Сравнява цената с историята за 90 дни и казва дали промоцията е реална.',
       now:'Сега', avg:'Средна цена (90 дни)', low:'Най-ниска (90 дни)', high:'Най-висока (90 дни)',
       floor30:'Дъно за последните 30 дни', price:'цена', avgLeg:'средна (90д)',
       footer:'Демо с примерни данни, изчислени от реалното ядро (логика по духа на EU Omnibus). Референция за намалението е най-ниската цена през предходните 30 дни, не „старата цена“ от етикета.' },
  sr:{ tagline:'Upoređuje cenu sa istorijom od 90 dana i kaže da li je akcija prava.',
       now:'Sada', avg:'Prosečna cena (90 dana)', low:'Najniža (90 dana)', high:'Najviša (90 dana)',

// Deterministic per-(chain,product) spread [0,12%] — fallback for non-BG markets.
function chainDelta(chain, pid) {
  let h = 0; const s = chain + '|' + pid;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return (h % 13) / 100;
}
function offersFor(p) {
  // Use real chain prices from data.js when available (BG market).
  if (p.offers && p.offers.length) return p.offers.map(o => ({...o}));
  // Fallback: synthetic spread for other markets.
  const chains = CHAINS_BY_COUNTRY[country.code] || [];
  const raw = chains.map(c => ({ chain: c, d: chainDelta(c, p.id) }));
  const minD = Math.min(...raw.map(r => r.d));
  return raw.map(r => ({ chain: r.chain, price: p.current_price * (1 + r.d - minD) }))
            .sort((a, b) => a.price - b.price);
}

const money = vBgn => vBgn == null ? '—' : disp(vBgn * country.fx) + ' ' + country.sym;
const unitLabel = kind => country.sym + '/' + UNIT[kind][country.lang];
const unitWord = kind => (UNIT[kind] ? UNIT[kind][country.lang] : '');

// Single-screen accordion: one compact row per product; tap to expand its
// chart + summary inline, without leaving the screen.
function doSearch(q) { query = q.trim().toLowerCase(); active = -1; renderProducts(); }
function toggleCart(id) {
  cart[id] = cart[id] ? 0 : 1;
  renderProducts();
  renderTabs(); // update badge on basket tab
}
function cartIds() { return Object.keys(cart).filter(id => cart[id]); }
function cartSize() { return cartIds().length; }
function analyzeStores() {
  const ids = cartIds();
  if (!ids.length) return [];
  const chainSet = new Set();
  ids.forEach(id => { const p = products.find(p => p.id === id); if (p) offersFor(p).forEach(o => chainSet.add(o.chain)); });
  return Array.from(chainSet).map(chain => {
    let total = 0; const covered = [], missing = [];
    ids.forEach(id => {
      const p = products.find(p => p.id === id);
      if (!p) return;
      const offer = offersFor(p).find(o => o.chain === chain);
      if (offer) { total += offer.price; covered.push(id); }
      else missing.push(id);
    });
    return { chain, total, covered, missing };
  }).sort((a, b) => b.covered.length - a.covered.length || a.total - b.total);
}

function sparkline(series, w=58, h=20) {
  if (!series || series.length < 3) return '';
  const vals = series.map(s => s.price);
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const rng = mx - mn || mn * 0.01 || 1;
  const pad = 2;
  const pts = vals.map((v, i) =>
    `${(i / (vals.length - 1) * w).toFixed(1)},${(h - pad - (v - mn) / rng * (h - pad * 2)).toFixed(1)}`
  ).join(' ');
  const lx = w, ly = +(h - pad - (vals.at(-1) - mn) / rng * (h - pad * 2)).toFixed(1);
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="var(--vc,#16a34a)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="2.2" fill="var(--vc,#16a34a)"/>
  </svg>`;
}

function renderProducts() {
  const filtered = query
    ? products.filter(p => { const m = PRODUCTS[p.id]; const n = m ? (m.name[country.lang] || m.name.bg || '') : p.id; return n.toLowerCase().includes(query); })
    : products;
  document.getElementById('cards').innerHTML = filtered.map((p, i) => {
    const meta = PRODUCTS[p.id];
    const on = i === active;
    const disc = p.discount_pct != null && p.discount_pct > 0
        ? `<em style="background:${C[p.verdict]}">−${p.discount_pct}%</em>` : '';
    const unit = p.current_unit_price == null ? ''
        : ` <small>· ${disp(p.current_unit_price*country.fx)} ${unitLabel(p.unit_kind)}</small>`;
    const inCart = !!cart[p.id];
    const rowHtml = `
      <button class="prow ${on?'on':''}" onclick="select(${i})" data-v="${p.verdict}" style="--vc:${C[p.verdict]}">
        <span class="ill">${emojiOf(p.id)}</span>
        <span class="pnm">${meta.name[country.lang]} <span class="vtag" style="background:${C[p.verdict]}">${TAG[p.verdict][country.lang]}</span><small>${meta.pack[country.lang]}${unit}</small></span>
        <span class="cadd ${inCart?'in':''}" role="button" tabindex="0" onclick="event.stopPropagation();toggleCart('${p.id}')">${inCart?'✓':'+'}</span>
        <span class="ppr">${money(p.current_price)}${disc}${sparkline(p.series)}</span>
      </button>`;
    return rowHtml + (on ? detailHTML(p) : '');
  }).join('');
  if (active >= 0 && active < filtered.length) {
    drawChart(filtered[active], C[filtered[active].verdict]);
  }
}

  return `<div class="detail">
    <span class="badge" style="background:${col}"><span class="ico">${ICON[p.verdict]}</span>${BADGE[p.verdict][country.lang]}</span>
    <div class="reason">${reason}</div>
    <div class="chart-box"><canvas id="chart"></canvas></div>
    <table class="sum">
      ${row(col, L.now, money(p.current_price) + discTxt)}
      ${row('#94a3b8', L.avg, money(p.median_90))}
      ${row(C.green, L.low, money(p.min_90), p.lowest_day)}

}

  return `<tr><td>${pill}${label}</td><td>${value}${date}</td></tr>`;
}

function renderTable() {
  const chainSet = new Set();
  products.forEach(p => offersFor(p).forEach(o => chainSet.add(o.chain)));
  const chains = Array.from(chainSet);
  const rows = products.map(p => {
    const meta = PRODUCTS[p.id];
    const name = (meta.name[country.lang] || meta.name.bg);
    const pack = meta.pack ? (meta.pack[country.lang] || meta.pack.bg) : '';
    const offers = offersFor(p);
    const minPrice = Math.min(...offers.map(o => o.price));
    const cells = chains.map(c => {
      const o = offers.find(o => o.chain === c);
      if (!o) return '<td>—</td>';
      const isBest = Math.abs(o.price - minPrice) < 0.005;
      return `<td class="${isBest ? 'tmin' : ''}">${money(o.price)}</td>`;
    }).join('');
    return `<tr><td>${emojiOf(p.id)} ${name}<br><span class="tpack">${pack}</span></td>${cells}</tr>`;
  }).join('');
  document.getElementById('basket').innerHTML = `
    <div class="panel" style="padding:0;overflow-x:auto;border-radius:16px">
      <table class="ctable">
        <thead><tr><th></th>${chains.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function lastIndexNear(arr, target) {
  if (target == null) return -1;
  let idx = -1; arr.forEach((v, i) => { if (Math.abs(v - target) < 1e-9) idx = i; }); return idx;
}

let chart = null;
const zonePlugin = {
  id: 'zones',
  beforeDatasetsDraw(c, _a, opts) {
    if (opts.median == null) return;
    const { ctx, chartArea:{left,right,top,bottom}, scales:{y} } = c;
    let ym = y.getPixelForValue(opts.median); ym = Math.max(top, Math.min(bottom, ym));
    ctx.save();
    ctx.fillStyle='rgba(22,163,74,0.06)'; ctx.fillRect(left, ym, right-left, bottom-ym);
    ctx.fillStyle='rgba(220,38,38,0.06)'; ctx.fillRect(left, top, right-left, ym-top);
    ctx.restore();
  },
};

function drawChart(p, col) {
  const fx = country.fx, L = t();
  const labels = p.series.map(s => ddmm(s.day));
  const base = p.series.map(s => s.price);
  const prices = base.map(v => v * fx);
  const lastIdx = base.length - 1;
  const lowIdx = lastIndexNear(base, p.min_90);
  const highIdx = lastIndexNear(base, p.max_90);
  const radius = base.map((_, i) => i===lastIdx?5:(i===lowIdx||i===highIdx?4:0));
  const pColor = base.map((_, i) => i===lastIdx?col:(i===lowIdx?C.green:(i===highIdx?C.red:'transparent')));

  const datasets = [{
    label:L.price, data:prices, borderColor:col, backgroundColor:col+'14',
    borderWidth:2, fill:true, stepped:true,
    pointRadius:radius, pointBackgroundColor:pColor, pointBorderColor:'#fff', pointBorderWidth:1.5,
  }];
  const medianDisp = p.median_90==null ? null : p.median_90*fx;
  if (medianDisp!=null) datasets.push({
    label:L.avgLeg, data:base.map(()=>medianDisp), borderColor:'#94a3b8', borderWidth:1.3,
    borderDash:[6,6], pointRadius:0, fill:false,
  });

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type:'line', data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false, interaction:{ intersect:false, mode:'index' },
      plugins:{
        zones:{ median:medianDisp },
        legend:{ display:true, labels:{ boxWidth:12, font:{size:11} } },
        tooltip:{ callbacks:{ label:c => c.dataset.label + ': ' + disp(c.parsed.y) + ' ' + country.sym } },
      },
      scales:{
        x:{ ticks:{ maxTicksLimit:7, font:{size:10}, color:'#94a3b8' }, grid:{ display:false } },
        y:{ ticks:{ callback:v => v.toFixed(country.dec), font:{size:10}, color:'#94a3b8' }, grid:{ color:'#eef2f6' } },
      },
    },
    plugins:[zonePlugin],
  });
}

let brochOpen = {};  // chain → expanded bool

function renderBrochures() {
  const X = BX[country.lang];
  const BD = window.SAVECHECK_BROCHURES;
  if (!BD) {
    document.getElementById('basket').innerHTML = `<div class="panel" style="text-align:center;padding:28px;color:var(--muted)">${X.brochNoData}</div>`;
    return;
  }
  const verdictBadge = v => {
    if (!v) return '';
    const col = C[v], label = v === 'red' ? X.brochFake : v === 'green' ? X.brochReal : '';
    if (!label) return '';
    return `<span style="background:${col};color:#fff;font-size:9px;font-weight:750;padding:1px 6px;border-radius:999px;margin-left:5px">${label}</span>`;
  };
  const chains = BD.chains.map(ch => {
    const isOpen = brochOpen[ch.chain] !== false;  // open by default
    const items = ch.items;
    const fakeN = items.filter(it => it.verdict === 'red').length;
    const realN = items.filter(it => it.verdict === 'green').length;
    const badges = [
      realN ? `<span style="background:var(--green);color:#fff;font-size:9.5px;font-weight:750;padding:2px 7px;border-radius:999px">🟢 ${realN}</span>` : '',
      fakeN ? `<span style="background:var(--red);color:#fff;font-size:9.5px;font-weight:750;padding:2px 7px;border-radius:999px">🔴 ${fakeN}</span>` : '',
    ].filter(Boolean).join(' ');
    const rows = items.slice(0, isOpen ? undefined : 5).map(it => {
      const pctTxt = it.claimed_pct ? `<span class="bi-pct">−${it.claimed_pct}%</span>` : '';
      const oldTxt = it.retail ? `<span class="bi-old">${money(it.retail)}</span>` : '';
      const badge = verdictBadge(it.verdict);
      return `<div class="broch-item">
        <div class="bi-name">${it.name}${badge}</div>
        <div style="text-align:right">${oldTxt} ${pctTxt}<br><span class="bi-price">${money(it.price)}</span></div>
      </div>`;
    }).join('');
    const toggleBtn = items.length > 5
      ? `<div style="text-align:center;padding:8px;border-top:1px solid var(--line);font-size:12px;color:var(--green);cursor:pointer;font-weight:700"
           onclick="brochOpen['${ch.chain}']=${!isOpen};renderBrochures()">
           ${isOpen ? X.brochCollapse : X.brochExpand + ` (${items.length - 5})`}
         </div>` : '';
    return `<div class="broch-chain">
      <div class="broch-head" onclick="brochOpen['${ch.chain}']=!${isOpen};renderBrochures()">
        <div><span class="bh-name">${ch.chain}</span><span class="bh-count" style="margin-left:8px">${ch.total_promos} ${X.brochPromos}</span></div>
        <div class="bh-badge">${badges} <span style="color:var(--muted);font-size:16px">${isOpen?'▲':'▼'}</span></div>
      </div>
      ${isOpen ? `<div class="broch-body">${rows}${toggleBtn}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('basket').innerHTML = `
    <div class="broch-hero">
      <div class="bh-title">📋 ${X.brochTitle} <span style="font-weight:400;font-size:13px;opacity:.85">${BD.week_label || ''}</span></div>
      <div class="bh-sub">${X.brochSub}</div>
    </div>
    ${chains || `<div style="text-align:center;padding:20px;color:var(--muted)">${X.brochNoData}</div>`}`;
}

function renderTitans() {

  const data = (DEMO.titans || []).slice().sort((a, b) => {
    const ra = a.total_promos ? a.real / a.total_promos : -1;

    return rb - ra;
  });
  const medals = ['🥇', '🥈', '🥉', '4.', '5.'];
  const cards = data.map((t, i) => {
    const hasPromos = t.total_promos > 0;
    const realPct = hasPromos ? Math.round(100 * t.real / t.total_promos) : null;
    const fakePct = hasPromos ? 100 - realPct : null;
    const bar = hasPromos ? `
      <div class="titan-bar-wrap">

        <div class="titan-bar-fake" style="flex:1"></div>

    const scoreStyle = !hasPromos ? 'color:var(--muted)' : realPct >= 70 ? 'color:var(--green)' : realPct >= 40 ? 'color:var(--yellow)' : 'color:var(--red)';
    const scoreText = hasPromos ? `${realPct}%` : '—';
    return `<div class="titan-card">

        <span class="titan-rank">${medals[i] || (i+1+'.')}</span>

}

      const d = p.median_90 - p.current_price;
      if (d > 0 && p.verdict === 'green') { saved += d; realCount++; }
    }
  });
  const deals = products
    .filter(p => p.verdict === 'green' && p.discount_pct > 0)
    .sort((a, b) => b.discount_pct - a.discount_pct)
    .slice(0, 7);
  const titans = (DEMO.titans || []).slice()
    .sort((a, b) => {
      const ra = a.total_promos ? a.real / a.total_promos : -1;
      const rb = b.total_promos ? b.real / b.total_promos : -1;
      return rb - ra;
    }).slice(0, 3);

  const dealsHTML = deals.length
    ? deals.map(p => {
        const meta = PRODUCTS[p.id], idx = products.indexOf(p);
        return `<div class="deal-card" onclick="setView('shop');shopTab='products';setTimeout(()=>select(${idx}),80)">
          <div class="deal-emoji">${emojiOf(p.id)}</div>
          <div class="deal-name">${meta.name[country.lang]||meta.name.bg}</div>
          <div class="deal-disc" style="color:var(--green)">−${p.discount_pct}%</div>
          <div class="deal-price">${money(p.current_price)}</div>
        </div>`;
      }).join('')
    : `<div style="color:var(--muted);font-size:var(--t-sm);padding:2px 0 10px">${X.homeNoDeals}</div>`;

  const titansHTML = titans.map((t, i) => {
    const medals = ['🥇','🥈','🥉'];
    const pct = t.total_promos ? Math.round(100 * t.real / t.total_promos) : null;
    const col = pct == null ? 'var(--muted)' : pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="mini-titan">
      <span style="font-size:18px;line-height:1">${medals[i]}</span>
      <span style="flex:1;font-weight:700;font-size:var(--t-base)">${t.chain}</span>
      <span style="font-weight:900;font-size:var(--t-lg);color:${col}">${pct != null ? pct+'%' : '—'}</span>
    </div>`;
  }).join('');

  document.getElementById('basket').innerHTML = `
    <div class="home-hero">
      <div class="home-hero-lbl">${H.saved}</div>
      <div class="home-hero-amt">${disp(saved * country.fx)} ${country.sym}</div>
      <div class="home-hero-meta">🟢 ${realCount} ${H.promos}</div>
    </div>
    <div class="section-label">${X.homeDeals}</div>
    ${deals.length ? `<div class="deal-scroll">${dealsHTML}</div>` : dealsHTML}
    ${titans.length ? `
    <div class="section-label" style="margin-top:14px">${X.titansTitle}</div>
    <div class="card-block">${titansHTML}
      <div style="text-align:center;padding:9px;border-top:1px solid var(--line);font-size:var(--t-sm);color:var(--green);font-weight:700;cursor:pointer"
           onclick="setView('promos');promosTab='titans';render()">→ ${X.tabTitans}</div>
    </div>` : ''}`;
}

function renderScan() {
  const X = BX[country.lang];
  document.getElementById('basket').innerHTML = `
    <button class="scan-btn" onclick="startScanner()">${X.scanBtn}</button>
    <div id="scan-output"></div>`;
}

async function startScanner() {
  const X = BX[country.lang];
  const output = document.getElementById('scan-output');
  if (!('BarcodeDetector' in window)) {
    output.innerHTML = `<div class="scan-result-card" style="text-align:center">
      <div style="color:var(--muted);margin-bottom:10px">${X.scanNoBD}</div>
      <label style="display:inline-block;background:var(--green);color:#fff;padding:8px 16px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px">
        ${X.scanFile}<input type="file" accept="image/*" capture="environment" style="display:none" onchange="scanFile(this)">
      </label>
    </div>`;
    return;
  }
  output.innerHTML = `<div class="scan-wrap"><video id="scan-video" autoplay playsinline muted></video>
    <div class="scan-frame"></div><div class="scan-hint">${X.scanHint}</div></div>`;
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video = document.getElementById('scan-video');
    video.srcObject = scanStream;
    const detector = new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e']});
    const detect = async () => {
      if (!scanStream) return;
      try {
        const codes = await detector.detect(video);
        if (codes.length) { stopScanner(); await handleBarcode(codes[0].rawValue); }
        else requestAnimationFrame(detect);
      } catch(e) { requestAnimationFrame(detect); }
    };
    await video.play(); detect();
  } catch(e) {
    output.innerHTML = `<div class="scan-result-card" style="text-align:center;color:var(--red)">Camera error: ${e.message}</div>`;
  }
}

function stopScanner() {
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
}

async function scanFile(input) {
  const file = input.files[0]; if (!file) return;
  const X = BX[country.lang];
  document.getElementById('scan-output').innerHTML = `<div class="scan-result-card" style="text-align:center;color:var(--muted)">${X.scanLookup}</div>`;
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.src = url;
  img.onload = async () => {
    try {
      const detector = new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e']});
      const codes = await detector.detect(img);
      if (codes.length) { await handleBarcode(codes[0].rawValue); }
      else {
        document.getElementById('scan-output').innerHTML =
          `<div class="scan-result-card" style="text-align:center;color:var(--muted)">${X.scanUnknown}</div>
           <button class="scan-btn" style="margin-top:12px" onclick="renderScan()">${X.scanAgain}</button>`;
      }
    } catch(e) { console.error(e); }
    URL.revokeObjectURL(url);
  };
}

async function handleBarcode(ean) {
  const X = BX[country.lang];
  document.getElementById('scan-output').innerHTML =
    `<div class="scan-result-card" style="text-align:center;color:var(--muted)">${X.scanLookup} ${ean}…</div>`;
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${ean}?fields=product_name_bg,product_name`);
    const d = await r.json();
    const name = d.status === 1 ? (d.product.product_name_bg || d.product.product_name || '') : '';
    showScanResult(ean, name, matchToBasket(name));
  } catch(e) { showScanResult(ean, '', null); }
}

function matchToBasket(name) {
  if (!name) return null;
  const nl = name.toLowerCase();
  for (const p of products) {
    const meta = PRODUCTS[p.id]; if (!meta) continue;
    const bg = (meta.name.bg || '').toLowerCase();
    const kws = bg.split(/\s+/).filter(w => w.length > 3);
    if (kws.some(kw => nl.includes(kw))) return p;
  }
  return null;
}

function showScanResult(ean, name, match) {
  const X = BX[country.lang];
  let html = '';
  if (match) {
    const col = C[match.verdict];
    html = `<div class="scan-result-card">
      <span class="badge" style="background:${col}"><span class="ico">${ICON[match.verdict]}</span>${BADGE[match.verdict][country.lang]}</span>
      <div class="ptitle">${PRODUCTS[match.id].name[country.lang]}
        <span style="font-size:12px;color:var(--muted);font-weight:500">${X.scanMatched} "${name}"</span>
      </div>
      <div class="reason">${REASONS[match.reason_code][country.lang](match.discount_pct)}</div>
      <table class="sum">
        ${row(col, t().now, money(match.current_price))}
        ${row('#94a3b8', t().avg, money(match.median_90))}
        ${row(C.green, t().low, money(match.min_90))}
        ${row(null, t().floor30, money(match.min_30_prior))}
      </table>
      <div class="scan-ean">EAN ${ean}</div>
    </div>`;
  } else if (name) {
    html = `<div class="scan-result-card" style="text-align:center">
      <div style="font-size:28px;margin-bottom:8px">🔍</div>
      <div style="font-weight:700;font-size:15px">${name}</div>
      <div style="color:var(--muted);font-size:12px;margin-top:6px">${X.scanNotTracked}</div>
      <div class="scan-ean">EAN ${ean}</div>
    </div>`;
  } else {
    html = `<div class="scan-result-card" style="text-align:center;color:var(--muted)">${X.scanUnknown} · EAN ${ean}</div>`;
  }
  html += `<button class="scan-btn" style="margin-top:12px" onclick="renderScan()">${X.scanAgain}</button>`;
  document.getElementById('scan-output').innerHTML = html;
}

function render() {
  renderFlags(); renderChrome(); renderTabs();
  const X = BX[country.lang];
  const isShop = view === 'shop';
  const isProd = isShop && shopTab === 'products';

  document.getElementById('hero').style.display = 'none';
  document.getElementById('cards').style.display = isProd ? '' : 'none';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('basket').style.display = isProd ? 'none' : '';

  const sw = document.getElementById('search-wrap');
  sw.style.display = isProd ? '' : 'none';
  if (isProd) document.getElementById('search-input').placeholder = X.search;

  // Sub-tabs
  const stw = document.getElementById('sub-tabs-wrap');
  if (isShop) {
    const n = cartSize();
    const cb = n ? `<span style="background:var(--green);color:#fff;font-size:9px;border-radius:999px;padding:0 5px;font-weight:800;margin-left:3px;line-height:1.6">${n}</span>` : '';
    stw.innerHTML = `<div class="sub-tabs">
      <button class="${shopTab==='products'?'active':''}" onclick="setShopTab('products')">${X.tabProducts}</button>
      <button class="${shopTab==='basket'?'active':''}" onclick="setShopTab('basket')">${X.tabBasket}${cb}</button>
      <button class="${shopTab==='fridge'?'active':''}" onclick="setShopTab('fridge')">${X.tabFridge}</button>
    </div>`;
  } else if (view === 'promos') {
    stw.innerHTML = `<div class="sub-tabs">
      <button class="${promosTab==='brochures'?'active':''}" onclick="setPromosTab('brochures')">${X.tabBrochures}</button>
      <button class="${promosTab==='titans'?'active':''}" onclick="setPromosTab('titans')">${X.tabTitans}</button>
    </div>`;
  } else {
    stw.innerHTML = '';
  }

  if (view === 'home') { renderHome(); }
  else if (isShop) {
    if (shopTab === 'products') renderProducts();
    else if (shopTab === 'basket') renderBasket();
    else renderFridge();
  }
  else if (view === 'promos') {
    if (promosTab === 'brochures') renderBrochures();
    else renderTitans();
  }
  else if (view === 'scan') { renderScan(); }
}
function animIn(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('anim-in');
  void el.offsetWidth;
  el.classList.add('anim-in');
}
function setShopTab(t) { shopTab = t; render(); animIn(t === 'products' ? 'cards' : 'basket'); }
function setPromosTab(t) { promosTab = t; render(); animIn('basket'); }
function select(i){ active = (active === i ? -1 : i); renderProducts(); }
function setCountry(i){ country = COUNTRIES[i]; document.documentElement.lang = country.lang; render(); }
function setView(v){
  if (v !== 'scan') stopScanner();
  view = v;
  if (v !== 'shop' || shopTab !== 'products') query = '';
  render();
  animIn(v === 'shop' && shopTab === 'products' ? 'cards' : 'basket');
}

render();

// ── Theme (dark / light) ──────────────────────────────────────────────────
const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const SUN  = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';

function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  const icon = document.getElementById('theme-icon');
  if (icon) icon.innerHTML = t === 'dark' ? SUN : MOON;
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('sc-theme', next);
  applyTheme(next);
}
(function initTheme() {
  const saved = localStorage.getItem('sc-theme');
  const sys   = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  applyTheme(saved || sys);
})();
</script>
</body>
