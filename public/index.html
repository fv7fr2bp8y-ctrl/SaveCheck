<style>
  :root {
    --green:#16a34a; --green-d:#15803d; --yellow:#f59e0b; --red:#dc2626; --gray:#6b7280;

  * { box-sizing:border-box; }
  body {

  .phone {
    max-width:430px; margin:0 auto; background:var(--cream); border:1px solid #e6e0d6;
    border-radius:34px; overflow:hidden; box-shadow:0 30px 70px rgba(28,25,23,.20);

  .appbar { background:var(--card); padding:16px 18px 12px; border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand .logo { width:32px; height:32px; flex:none; }
  .brand h1 { font-size:20px; margin:0; letter-spacing:-.02em; }
  .brand h1 b { color:var(--green); }
  .brand .sub { color:var(--muted); font-size:11.5px; margin-top:2px; line-height:1.3; }
  .flags { display:flex; gap:6px; margin-top:12px; overflow-x:auto; padding-bottom:2px; }
  .flags::-webkit-scrollbar { display:none; }
  .flags button {
    flex:none; border:1px solid var(--line); background:var(--cream); border-radius:9px; cursor:pointer;
    padding:4px 7px; font-size:15px; line-height:1; display:flex; align-items:center; gap:4px;
  }
  .flags button .cc { font-size:10px; font-weight:700; color:var(--muted); }
  .flags button.active { border-color:var(--green); background:#eaf5ee; }
  .flags button.active .cc { color:var(--green-d); }
  .hero {
    margin:14px 14px 0; color:#fff; border-radius:18px; padding:15px 17px;
    background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:0 12px 26px rgba(22,163,74,.28);

  .hero .lbl { font-size:12px; opacity:.92; font-weight:600; }
  .hero .amt { font-size:30px; font-weight:800; letter-spacing:-.02em; margin-top:2px; }
  .hero .meta { font-size:12px; opacity:.95; margin-top:3px; }
  .scroll { padding:14px; }
  .cards { background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  .prow {
    display:flex; align-items:center; gap:11px; width:100%; border:0; background:none; cursor:pointer;
    padding:11px 13px; text-align:left; border-top:1px solid var(--line);
  }
  .cards .prow:first-child { border-top:0; }
  .prow.on { background:#f7faf7; }
  .prow .dot { width:11px; height:11px; border-radius:50%; flex:none; }
  .prow .ill { width:36px; height:36px; border-radius:11px; background:#f1ede3; display:flex; align-items:center; justify-content:center; font-size:20px; flex:none; }
  .vtag { display:inline-block; font-size:9.5px; font-weight:750; color:#fff; padding:1px 7px; border-radius:999px; margin-left:4px; vertical-align:middle; letter-spacing:.02em; }
  .prow .pnm { flex:1; font-weight:700; font-size:14px; line-height:1.25; }
  .prow .pnm small { display:block; color:var(--muted); font-weight:500; font-size:11px; }
  .prow .ppr { font-weight:800; font-size:15px; font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap; }
  .prow .ppr em { display:block; font-style:normal; font-size:11px; font-weight:700; margin-top:1px; }
  .detail { padding:2px 13px 14px; background:#fcfcfb; border-top:1px solid var(--line); }
  .detail .badge { margin-top:10px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin-top:12px; }
  .badge {
    display:inline-flex; align-items:center; gap:8px; color:#fff; font-weight:750; font-size:13.5px;
    padding:7px 13px; border-radius:999px;
  }
  .badge .ico { font-size:15px; }
  .ptitle { font-weight:800; font-size:16px; margin:12px 0 0; }
  .ptitle span { color:var(--muted); font-weight:500; font-size:12.5px; }
  .reason { margin:6px 0 4px; font-size:14px; line-height:1.45; }
  .chart-box { position:relative; height:210px; margin:10px 0 2px; }
  .sum { width:100%; border-collapse:collapse; margin-top:8px; font-size:13px; }
  .sum td { padding:7px 2px; border-top:1px solid var(--line); }
  .sum td:first-child { color:var(--muted); }
  .sum td:last-child { text-align:right; font-weight:700; font-variant-numeric:tabular-nums; }
  .sum .date { color:var(--muted); font-weight:500; font-size:11.5px; }
  .pill { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; vertical-align:middle; }
  .offers { margin-top:14px; }
  .otitle { font-size:11px; font-weight:750; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
  .orow, .brow, .irow {
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:9px 2px; border-top:1px solid var(--line); font-size:13px;
  }
  .orow.best span:first-child, .brow.best span:first-child { color:var(--green); font-weight:700; }
  .orow span:last-child, .brow span:last-child, .irow span:last-child { font-variant-numeric:tabular-nums; font-weight:700; }
  .bbadge { background:var(--green); color:#fff; font-size:9.5px; font-weight:750; padding:2px 7px; border-radius:999px; margin-left:7px; }
  .save { color:var(--green); font-size:11.5px; font-weight:700; margin-left:8px; }
  .irow span:last-child { color:var(--muted); font-weight:600; }
  .bottomnav { display:flex; background:var(--card); border-top:1px solid var(--line); }
  .bottomnav button {
    flex:1; border:0; background:none; cursor:pointer; padding:9px 4px 12px; color:var(--muted);
    font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .bottomnav button .ic { font-size:18px; line-height:1; }
  .bottomnav button.on { color:var(--green-d); }
  footer { color:var(--muted); font-size:11px; line-height:1.5; max-width:430px; margin:14px auto 0; text-align:center; padding:0 16px; }
</style>
</head>

// Deterministic per-(chain,product) spread in [0,12%]; the cheapest chain in a
// market is normalised to the product's current (promo) price.
function chainDelta(chain, pid) {
  let h = 0; const s = chain + '|' + pid;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return (h % 13) / 100;
}
function offersFor(p) {
  const chains = CHAINS_BY_COUNTRY[country.code] || [];
  const raw = chains.map(c => ({ chain: c, d: chainDelta(c, p.id) }));
  const minD = Math.min(...raw.map(r => r.d));
  return raw.map(r => ({ chain: r.chain, price: p.current_price * (1 + r.d - minD) }))
            .sort((a, b) => a.price - b.price);
}

const fmtQty = v => Number.isInteger(v) ? String(v) : String(Math.round(v * 100) / 100);

}

function lastIndexNear(arr, target) {
  if (target == null) return -1;
  let idx = -1; arr.forEach((v, i) => { if (Math.abs(v - target) < 1e-9) idx = i; }); return idx;
}

let chart = null;
const zonePlugin = {
  id: 'zones',
  beforeDatasetsDraw(c, _a, opts) {
    if (opts.median == null) return;
    const { ctx, chartArea:{left,right,top,bottom}, scales:{y} } = c;
    let ym = y.getPixelForValue(opts.median); ym = Math.max(top, Math.min(bottom, ym));
    ctx.save();
    ctx.fillStyle='rgba(22,163,74,0.06)'; ctx.fillRect(left, ym, right-left, bottom-ym);
    ctx.fillStyle='rgba(220,38,38,0.06)'; ctx.fillRect(left, top, right-left, ym-top);
    ctx.restore();
  },
};

function drawChart(p, col) {
  const fx = country.fx, L = t();
  const labels = p.series.map(s => ddmm(s.day));
  const base = p.series.map(s => s.price);
  const prices = base.map(v => v * fx);
  const lastIdx = base.length - 1;
  const lowIdx = lastIndexNear(base, p.min_90);
  const highIdx = lastIndexNear(base, p.max_90);
  const radius = base.map((_, i) => i===lastIdx?5:(i===lowIdx||i===highIdx?4:0));
  const pColor = base.map((_, i) => i===lastIdx?col:(i===lowIdx?C.green:(i===highIdx?C.red:'transparent')));

  const datasets = [{
    label:L.price, data:prices, borderColor:col, backgroundColor:col+'14',
    borderWidth:2, fill:true, stepped:true,
    pointRadius:radius, pointBackgroundColor:pColor, pointBorderColor:'#fff', pointBorderWidth:1.5,
  }];
  const medianDisp = p.median_90==null ? null : p.median_90*fx;
  if (medianDisp!=null) datasets.push({
    label:L.avgLeg, data:base.map(()=>medianDisp), borderColor:'#94a3b8', borderWidth:1.3,
    borderDash:[6,6], pointRadius:0, fill:false,
  });

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type:'line', data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false, interaction:{ intersect:false, mode:'index' },
      plugins:{
        zones:{ median:medianDisp },
        legend:{ display:true, labels:{ boxWidth:12, font:{size:11} } },
        tooltip:{ callbacks:{ label:c => c.dataset.label + ': ' + disp(c.parsed.y) + ' ' + country.sym } },
      },
      scales:{
        x:{ ticks:{ maxTicksLimit:7, font:{size:10}, color:'#94a3b8' }, grid:{ display:false } },
        y:{ ticks:{ callback:v => v.toFixed(country.dec), font:{size:10}, color:'#94a3b8' }, grid:{ color:'#eef2f6' } },
      },
    },
    plugins:[zonePlugin],
  });
}

function render() {
  renderFlags(); renderChrome(); renderHero(); renderTabs();
  const prod = view === 'products';
  document.getElementById('cards').style.display = prod ? '' : 'none';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('basket').style.display = prod ? 'none' : '';
  if (prod) { renderProducts(); }
  else if (view === 'basket') { renderBasket(); }
  else { renderFridge(); }
}
function select(i){ active = (active === i ? -1 : i); renderProducts(); }
function setCountry(i){ country = COUNTRIES[i]; document.documentElement.lang = country.lang; render(); }
function setView(v){ view = v; render(); }

render();
</script>
</body>
</html>
