<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SaveCheck — реална ли е промоцията?</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="./data.js"></script>
<style>
  :root {
    --green:#16a34a; --yellow:#f59e0b; --red:#dc2626; --gray:#6b7280;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f1f5f9; --card:#ffffff;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:760px; margin:0 auto; padding:20px 16px 60px; }
  header h1 { font-size:22px; margin:0 0 2px; letter-spacing:-.02em; }
  header h1 b { color:var(--green); }
  header p { margin:0 0 18px; color:var(--muted); font-size:13.5px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .card {
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 13px;
    cursor:pointer; transition:transform .08s, box-shadow .12s, border-color .12s; text-align:left;
  }
  .card:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(15,23,42,.07); }
  .card.active { border-color:var(--ink); box-shadow:0 6px 18px rgba(15,23,42,.10); }
  .card .nm { font-weight:650; font-size:14px; }
  .card .pk { color:var(--muted); font-size:12px; margin-bottom:8px; }
  .card .pr { font-size:18px; font-weight:750; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .g{background:var(--green)} .y{background:var(--yellow)} .r{background:var(--red)} .x{background:var(--gray)}
  .panel { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; margin-top:16px; }
  .badge {
    display:inline-flex; align-items:center; gap:8px; color:#fff; font-weight:750; font-size:14px;
    padding:7px 13px; border-radius:999px;
  }
  .badge .ico { font-size:15px; }
  .reason { margin:12px 0 4px; font-size:15px; line-height:1.45; }
  .stats { display:flex; flex-wrap:wrap; gap:18px; margin:14px 0 6px; }
  .stat .k { color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.03em; }
  .stat .v { font-weight:700; font-size:16px; }
  .chart-box { position:relative; height:240px; margin-top:8px; }
  footer { color:var(--muted); font-size:12px; margin-top:22px; line-height:1.5; }
  footer code { background:#e7edf3; padding:1px 5px; border-radius:5px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Save<b>Check</b></h1>
    <p>Сравнява цената с историята за 90 дни и казва дали промоцията е реална.</p>
  </header>
  <div class="cards" id="cards"></div>
  <div class="panel" id="panel"></div>
  <footer>
    Демо с примерни данни, изчислени от реалното ядро на приложението
    (логика по духа на EU&nbsp;Omnibus). Референция за намалението е най-ниската
    цена през предходните 30 дни, не „старата цена“ от етикета.
  </footer>
</div>

<script>
const C = { red:'#dc2626', green:'#16a34a', yellow:'#f59e0b', gray:'#6b7280' };
const ICON = { red:'✕', green:'✓', yellow:'≈', gray:'?' };
const DOT = { red:'r', green:'g', yellow:'y', gray:'x' };
const data = (window.SAVECHECK_DEMO || {products:[]}).products;
let chart = null, active = 0;

const bgn = v => v == null ? '—' : v.toFixed(2).replace('.', ',') + ' лв';
const ddmm = iso => { const [ , m, d] = iso.split('-'); return d + '.' + m; };

function renderCards() {
  document.getElementById('cards').innerHTML = data.map((p, i) => `
    <button class="card ${i===active?'active':''}" onclick="select(${i})">
      <div class="nm"><span class="dot ${DOT[p.verdict]}"></span>${p.name}</div>
      <div class="pk">${p.package}</div>
      <div class="pr">${bgn(p.current_price)}</div>
    </button>`).join('');
}

function renderPanel() {
  const p = data[active];
  const col = C[p.verdict];
  const discTxt = p.discount_pct != null && p.discount_pct > 0
      ? `<div class="stat"><div class="k">отстъпка</div><div class="v" style="color:${C.green}">−${p.discount_pct}%</div></div>` : '';
  document.getElementById('panel').innerHTML = `
    <span class="badge" style="background:${col}"><span class="ico">${ICON[p.verdict]}</span>${p.verdict_label}</span>
    <div class="reason">${p.reason}</div>
    <div class="stats">
      <div class="stat"><div class="k">сега</div><div class="v">${bgn(p.current_price)}</div></div>
      <div class="stat"><div class="k">обичайна (медиана 90д)</div><div class="v">${bgn(p.median_90)}</div></div>
      <div class="stat"><div class="k">90-дн. дъно</div><div class="v">${bgn(p.min_90)}</div></div>
      <div class="stat"><div class="k">дъно посл. 30д</div><div class="v">${bgn(p.min_30_prior)}</div></div>
      ${discTxt}
    </div>
    <div class="chart-box"><canvas id="chart"></canvas></div>`;
  drawChart(p, col);
}

function drawChart(p, col) {
  const labels = p.series.map(s => ddmm(s.day));
  const prices = p.series.map(s => s.price);
  const median = p.series.map(() => p.median_90);
  const lastIdx = prices.length - 1;
  const pointR = prices.map((_, i) => i === lastIdx ? 5 : 0);
  const pointC = prices.map((_, i) => i === lastIdx ? col : 'transparent');
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels, datasets: [
      { label:'цена', data:prices, borderColor:col, backgroundColor:col+'18',
        borderWidth:2, fill:true, tension:.15, stepped:false,
        pointRadius:pointR, pointBackgroundColor:pointC, pointBorderColor:'#fff', pointBorderWidth:1.5 },
      { label:'обичайна цена', data:median, borderColor:'#94a3b8', borderWidth:1.3,
        borderDash:[6,6], pointRadius:0, fill:false },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ intersect:false, mode:'index' },
      plugins:{ legend:{ display:true, labels:{ boxWidth:12, font:{size:11} } },
        tooltip:{ callbacks:{ label:c => c.dataset.label + ': ' + bgn(c.parsed.y) } } },
      scales:{
        x:{ ticks:{ maxTicksLimit:7, font:{size:10}, color:'#94a3b8' }, grid:{ display:false } },
        y:{ ticks:{ callback:v => v.toFixed(2), font:{size:10}, color:'#94a3b8' },
            grid:{ color:'#eef2f6' } },
      },
    },
  });
}

function select(i) { active = i; renderCards(); renderPanel(); }
renderCards(); renderPanel();
</script>
</body>
</html>
