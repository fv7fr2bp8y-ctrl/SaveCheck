<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Logo Variants — SaveCheck</title>
<style>
  body { margin:0; background:#f5f1ea; font-family:-apple-system,sans-serif; display:flex; flex-direction:column; align-items:center; padding:32px 16px; gap:24px; }
  h2 { margin:0; font-size:13px; color:#6b7280; text-transform:uppercase; letter-spacing:.08em; }
  .row { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .card { background:#fff; border-radius:20px; padding:24px 20px 16px; display:flex; flex-direction:column; align-items:center; gap:12px; box-shadow:0 2px 16px rgba(0,0,0,.1); width:160px; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
  .card:hover { border-color:#16a34a; }
  .card img { width:120px; height:120px; object-fit:contain; }
  .label { font-size:13px; font-weight:700; color:#374151; }
  .sublabel { font-size:11px; color:#9ca3af; text-align:center; }
  .dark-row { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .dark-card { background:#1c1c1e; border-radius:20px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:10px; width:130px; }
  .dark-card img { width:80px; height:80px; object-fit:contain; }
  .dark-card .label { color:#9ca3af; font-size:12px; font-weight:700; }
</style>
</head>
<body>

<h2>SaveCheck — AI генерирани лого варианти</h2>

<div class="row">
  <div class="card">
    <img src="./img/logos/logo-a.png" alt="Variant A"/>
    <div class="label">A — Щит + халка</div>
    <div class="sublabel">Щит, дупка на етикет, чекмарк</div>
  </div>
  <div class="card">
    <img src="./img/logos/logo-b.png" alt="Variant B"/>
    <div class="label">B — Ценови етикет</div>
    <div class="sublabel">Класически таг, халка, чекмарк</div>
  </div>
  <div class="card">
    <img src="./img/logos/logo-c.png" alt="Variant C"/>
    <div class="label">C — Щит + таг</div>
    <div class="sublabel">Щит с вграден етикет</div>
  </div>
  <div class="card">
    <img src="./img/logos/logo-d.png" alt="Variant D"/>
    <div class="label">D — Герб щит</div>
    <div class="sublabel">Хералдически щит, халка</div>
  </div>
</div>

<h2>На тъмен фон</h2>
<div class="dark-row">
  <div class="dark-card"><img src="./img/logos/logo-a.png"/><div class="label">A</div></div>
  <div class="dark-card"><img src="./img/logos/logo-b.png"/><div class="label">B</div></div>
  <div class="dark-card"><img src="./img/logos/logo-c.png"/><div class="label">C</div></div>
  <div class="dark-card"><img src="./img/logos/logo-d.png"/><div class="label">D</div></div>
</div>

</body>
</html>
